<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Fondo circular -->
  <circle cx="100" cy="100" r="95" fill="#FF9500" opacity="0.1" stroke="#FF9500" stroke-width="2"/>
  
  <!-- Llama de fuego (parte superior) -->
  <g id="flame">
    <!-- Base de la llama -->
    <ellipse cx="100" cy="45" rx="12" ry="8" fill="#FF9500"/>
    <!-- Parte media -->
    <path d="M 95 45 Q 90 30 95 20 Q 100 15 105 20 Q 110 30 105 45 Z" 
          fill="#FFB84D" stroke="#FF9500" stroke-width="0.5"/>
    <!-- Punta de la llama -->
    <path d="M 100 20 Q 97 10 100 0 Q 103 10 100 20 Z" 
          fill="#FFD700"/>
  </g>
  
  <!-- Bolsa de delivery (lado izquierdo) -->
  <g id="delivery-bag">
    <!-- Cuerpo de la bolsa -->
    <rect x="50" y="70" width="25" height="40" rx="2" fill="#1A1A1A" stroke="#FF9500" stroke-width="1.5"/>
    <!-- Asa de la bolsa -->
    <path d="M 55 70 Q 55 55 65 55 Q 75 55 75 70" 
          fill="none" stroke="#FF9500" stroke-width="2" stroke-linecap="round"/>
    <!-- Línea de cierre -->
    <line x1="50" y1="75" x2="75" y2="75" stroke="#FF9500" stroke-width="1"/>
  </g>
  
  <!-- Hamburguesa (lado derecho) -->
  <g id="burger">
    <!-- Pan superior (redondeado) -->
    <ellipse cx="135" cy="90" rx="15" ry="10" fill="#CD7F32" stroke="#8B5A2B" stroke-width="1"/>
    <!-- Sesamo (puntitos) -->
    <circle cx="128" cy="85" r="2" fill="#FFD700"/>
    <circle cx="135" cy="84" r="2" fill="#FFD700"/>
    <circle cx="142" cy="85" r="2" fill="#FFD700"/>
    
    <!-- Lechuga -->
    <ellipse cx="135" cy="102" rx="14" ry="6" fill="#10B981" opacity="0.8"/>
    
    <!-- Queso -->
    <rect x="123" y="105" width="24" height="6" rx="1" fill="#FFB84D"/>
    
    <!-- Carne -->
    <rect x="120" y="113" width="30" height="8" rx="1" fill="#8B4513"/>
    
    <!-- Pan inferior -->
    <ellipse cx="135" cy="125" rx="15" ry="10" fill="#CD7F32" stroke="#8B5A2B" stroke-width="1"/>
  </g>
  
  <!-- Línea divisoria sutil -->
  <line x1="100" y1="65" x2="100" y2="145" stroke="#FF9500" stroke-width="1" opacity="0.3"/>
  
  <!-- Texto del logo -->
  <text x="100" y="165" font-family="Arial, sans-serif" font-size="20" font-weight="bold" 
        text-anchor="middle" fill="#FF9500">Proecho</text>
  
  <!-- Eslogan -->
  <text x="100" y="185" font-family="Arial, sans-serif" font-size="8" 
        text-anchor="middle" fill="#4F4F4F" opacity="0.7">
    Tu comida más cerca que nunca
  </text>
</svg>
